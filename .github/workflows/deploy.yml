name: Deploy to KingHost FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Ajustado para fazer cache do NPM e acelerar os próximos deploys

      - name: Instalar dependências (Clean Install)
        run: npm ci # Usa o package-lock.json para uma instalação exata e segura

      - name: Build do projeto Vite
        run: npm run build # O comando correto que você pontuou!

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: www/
          state-name: .ftp-deploy-sync-state.json